name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build
        run: swift build 2>&1 | tee build.log && exit ${PIPESTATUS[0]}

      - name: Test
        run: swift test 2>&1 | tee test.log && exit ${PIPESTATUS[0]}
